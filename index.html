<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- Decorative background elements for glassmorphism -->
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>

    <div class="glass-container">
        <h1>Password Generator</h1>
        
        <div class="input-group">
            <input type="text" placeholder="Password" value="" id="inputText" readonly>
            <button class="copy">Copy</button>
        </div>
        
        <div class="controls">
            <div class="control-item">
                <input type="range" id="inputRange" value="8" min="6" max="100">
                <label id="rangeValue">8</label>
            </div>
            <label class="control-item checkbox-group">
                <input type="checkbox" id="inputNum" value="off">
                <span>Numbers</span>
            </label>
            <label class="control-item checkbox-group">
                <input type="checkbox" id="inputChar" value="off">
                <span>Characters</span>
            </label>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
